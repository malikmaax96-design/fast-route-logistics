<svg viewBox="0 0 260 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0" y1="0" x2="260" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="topFace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="frontFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>

  <!-- FRL Bold Text -->
  <text x="2" y="64"
    font-family="'Arial Black','Arial',sans-serif"
    font-weight="900"
    font-size="66"
    letter-spacing="-2"
    fill="url(#mainGrad)">FRL</text>

  <!-- Speed lines (motion effect between text and box) -->
  <line x1="143" y1="14" x2="163" y2="14" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <line x1="138" y1="26" x2="161" y2="26" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
  <line x1="135" y1="38" x2="159" y2="38" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/>
  <line x1="138" y1="50" x2="161" y2="50" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
  <line x1="143" y1="62" x2="163" y2="62" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>

  <!-- 3D Delivery Box -->
  <!-- Top face (parallelogram) -->
  <polygon points="178,6 230,22 208,36 156,20" fill="url(#topFace)"/>
  <!-- White tape strip on top face -->
  <polygon points="184,8 198,13 196,15 182,10" fill="rgba(255,255,255,0.55)" rx="1"/>

  <!-- Front face (left face) -->
  <polygon points="156,20 208,36 208,72 156,56" fill="url(#frontFace)"/>
  <!-- White vertical tape strip on front -->
  <rect x="176" y="37" width="8" height="33" fill="rgba(255,255,255,0.45)" rx="1"/>

  <!-- Right face -->
  <polygon points="208,36 230,22 230,58 208,72" fill="url(#rightFace)"/>

  <!-- Box outline highlight -->
  <polyline points="156,20 208,36 230,22 178,6 156,20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <polyline points="156,56 156,20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <polyline points="156,56 208,72 230,58 230,22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
</svg>
